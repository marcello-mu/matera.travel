<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sito provvisorio - Matera</title>
  <meta name="description" content="Sito provvisorio con fotografie di Matera, effetto Ken Burns e credits immagini Pexels.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="hero" aria-label="Galleria fotografica a pieno schermo di Matera">
    <div
      class="slide active"
      style="background-image: url('https://images.pexels.com/photos/17000130/pexels-photo-17000130.jpeg?auto=compress&cs=tinysrgb&w=2400');"
      data-credit="Foto: Masi / Pexels"
      data-credit-url="https://www.pexels.com/photo/17000130/"
    ></div>

    <div
      class="slide"
      style="background-image: url('https://images.pexels.com/photos/30417077/pexels-photo-30417077.jpeg?auto=compress&cs=tinysrgb&w=2400');"
      data-credit="Foto: AXP Photography / Pexels"
      data-credit-url="https://www.pexels.com/photo/30417077/"
    ></div>

    <div
      class="slide"
      style="background-image: url('https://images.pexels.com/photos/33414938/pexels-photo-33414938.jpeg?auto=compress&cs=tinysrgb&w=2400');"
      data-credit="Foto: Grunzibaer / Pexels"
      data-credit-url="https://www.pexels.com/photo/33414938/"
    ></div>

    <div
      class="slide"
      style="background-image: url('https://images.pexels.com/photos/37190932/pexels-photo-37190932.jpeg?auto=compress&cs=tinysrgb&w=2400');"
      data-credit="Foto: P G / Pexels"
      data-credit-url="https://www.pexels.com/photo/matera-s-iconic-sassi-landscape-in-italy-37190932/"
    ></div>

    <div
      class="slide"
      style="background-image: url('https://images.pexels.com/photos/37190930/pexels-photo-37190930.jpeg?auto=compress&cs=tinysrgb&w=2400');"
      data-credit="Foto: P G / Pexels"
      data-credit-url="https://www.pexels.com/photo/scenic-view-of-matera-s-sassi-and-historic-site-37190930/"
    ></div>

    <div
      class="slide"
      style="background-image: url('https://images.pexels.com/photos/24777984/pexels-photo-24777984.jpeg?auto=compress&cs=tinysrgb&w=2400');"
      data-credit="Foto: Pincalo / Pexels"
      data-credit-url="https://www.pexels.com/photo/sassi-di-matera-in-matera-in-italy-24777984/"
    ></div>

    <div
      class="slide"
      style="background-image: url('https://images.pexels.com/photos/37190943/pexels-photo-37190943.jpeg?auto=compress&cs=tinysrgb&w=2400');"
      data-credit="Foto: P G / Pexels"
      data-credit-url="https://www.pexels.com/photo/panoramic-view-of-historic-sassi-di-matera-37190943/"
    ></div>

    <div
      class="slide"
      style="background-image: url('https://images.pexels.com/photos/30099446/pexels-photo-30099446.jpeg?auto=compress&cs=tinysrgb&w=2400');"
      data-credit="Foto: AXP Photography / Pexels"
      data-credit-url="https://www.pexels.com/photo/30099446/"
    ></div>

    <div class="overlay" aria-hidden="true"></div>

    <section class="text" aria-label="Testo principale">
      <p class="eyebrow">Matera</p>
      <h1>Il tuo titolo qui</h1>
      <p class="subtitle">Una frase breve in sovrimpressione sulle fotografie.</p>
    </section>

    <div class="credit" id="photo-credit" aria-live="polite"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
